<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard แผนพัฒนาจังหวัดเชียงใหม่</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Sarabun', sans-serif; background-color: #f4f7f6; margin: 0; padding: 20px; }
        .container { max-width: 1200px; margin: auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: #1a365d; }
        .filter-section { background: #e2e8f0; padding: 15px; border-radius: 8px; margin-bottom: 20px; }
        select { padding: 10px; width: 100%; max-width: 400px; font-family: 'Sarabun', sans-serif; font-size: 16px; }
        .dashboard-grid { display: flex; gap: 20px; margin-bottom: 20px; }
        .box { flex: 1; height: 300px; background: #edf2f7; border-radius: 8px; display: flex; align-items: center; justify-content: center; border: 1px solid #cbd5e0; color: #4a5568;}
        table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 14px; }
        th, td { border: 1px solid #cbd5e0; padding: 10px; text-align: left; }
        th { background-color: #2b6cb0; color: white; }
        .loading { text-align: center; font-size: 1.2em; color: #d69e2e; font-weight: bold; margin: 20px 0; }
    </style>
</head>
<body>

<div class="container">
    <h1>📊 ข้อมูลโครงการแผนพัฒนาจังหวัดเชียงใหม่</h1>

    <div class="filter-section">
        <label for="strategySelect"><strong>🎯 เลือกประเด็นยุทธศาสตร์:</strong></label>
        <select id="strategySelect">
            <option value="all">-- กำลังโหลดข้อมูล --</option>
        </select>
    </div>

    <div class="dashboard-grid">
        <div class="box" id="mapDisplay">📍 [พื้นที่สำหรับแผนที่ Leaflet.js]</div>
        <div class="box" id="chartDisplay">🍩 [พื้นที่สำหรับกราฟ Chart.js แยก Single/Multi]</div>
    </div>

    <div id="loadingText" class="loading">⏳ กำลังดึงข้อมูลจากฐานข้อมูล... โปรดรอสักครู่</div>
    <div style="overflow-x: auto;">
        <table id="dataTable">
            <thead>
                <tr>
                    <th>ชื่อโครงการ</th>
                    <th>ยุทธศาสตร์ชาติ 20 ปี</th>
                    <th>พื้นที่ดำเนินการ</th>
                    <th>งบประมาณ (บาท)</th>
                </tr>
            </thead>
            <tbody id="tableBody">
                </tbody>
        </table>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
